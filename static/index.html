<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DevTrack</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>

<div id="loginPage" class="container">

    <h1>DevTrack</h1>
    <p>AI Powered Job Tracker</p>

    <h2>Login</h2>

    <input type="email" id="email" placeholder="Email">

    <input type="password" id="password" placeholder="Password">

    <button onclick="login()">Login</button>

</div>


<div id="dashboardPage" class="container" style="display:none;">

    <h1>Dashboard</h1>
    <button onclick="logout()">Logout</button>
    <h3>Welcome!</h3>

    <p>Total Applications:
        <span id="total">0</span>
    </p>

    <p>Applied:
        <span id="applied">0</span>
    </p>

    <p>Interview:
        <span id="interview">0</span>
    </p>

    <p>Offer:
        <span id="offer">0</span>
    </p>

    <p>Rejected:
        <span id="rejected">0</span>
    </p>
    <h2>Add Application</h2>

<input
    type="text"
    id="company"
    placeholder="Company">

<input
    type="text"
    id="role"
    placeholder="Role">

<input
    type="text"
    id="location"
    placeholder="Location">

<textarea
    id="jd"
    placeholder="Job Description"
    rows="5"
    style="width:100%;margin-top:10px;"></textarea>

<button id="saveButton" onclick="addApplication()">
    Add Application
</button>
<input
    type="text"
    id="search"
    placeholder="Search Company..."
    onkeyup="loadApplications()">
    <h2>My Applications</h2>

<table id="applicationTable" border="1" style="width:100%; margin-top:20px;">
    <thead>
        <tr>
            <th>Company</th>
            <th>Role</th>
            <th>Status</th>
            <th>Action</th>
        </tr>
    </thead>

    <tbody id="applicationBody">

    </tbody>
</table>

</div>

<script src="js/app.js"></script>
<div style="margin-top:20px; text-align:center;">

    <button onclick="previousPage()">
        Previous
    </button>

    <span id="pageNumber" style="margin:0 20px;">
        Page 1
    </span>

    <button onclick="nextPage()">
        Next
    </button>

</div>

</body>
</html>
