<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DevTrack</title>

    <link rel="stylesheet" href="css/styles.css">
</head>

<body>

    <!-- ================= LOGIN PAGE ================= -->

    <div id="loginPage" class="container">

        <h1>DevTrack</h1>
        <p>AI Powered Job Tracker</p>

        <h2>Login</h2>

        <input
            type="email"
            id="email"
            placeholder="Email">

        <input
            type="password"
            id="password"
            placeholder="Password">

        <button onclick="login()">
            Login
        </button>

    </div>


    <!-- ================= DASHBOARD ================= -->

    <div id="dashboardPage" class="container" style="display:none;">

        <h1>Dashboard</h1>

        <button onclick="logout()">
            Logout
        </button>

        <h3>Welcome!</h3>

        <!-- Dashboard Cards -->

        <div class="cards">

            <div class="card">
                <h3>Total</h3>
                <h1 id="total">0</h1>
            </div>

            <div class="card">
                <h3>Applied</h3>
                <h1 id="applied">0</h1>
            </div>

            <div class="card">
                <h3>Interview</h3>
                <h1 id="interview">0</h1>
            </div>

            <div class="card">
                <h3>Offer</h3>
                <h1 id="offer">0</h1>
            </div>

            <div class="card">
                <h3>Rejected</h3>
                <h1 id="rejected">0</h1>
            </div>

        </div>

        <!-- Add Application -->

        <h2>Add Application</h2>

        <input
            type="text"
            id="company"
            placeholder="Company">

        <input
            type="text"
            id="role"
            placeholder="Role">

        <input
            type="text"
            id="location"
            placeholder="Location">

        <textarea
            id="jd"
            rows="5"
            placeholder="Job Description"></textarea>

        <button
            id="saveButton"
            onclick="addApplication()">
            Add Application
        </button>

        <!-- Search -->

        <input
            type="text"
            id="search"
            placeholder="Search Company..."
            onkeyup="loadApplications()">

        <!-- Applications Table -->

        <h2>My Applications</h2>

        <table id="applicationTable">

            <thead>

                <tr>
                    <th>Company</th>
                    <th>Role</th>
                    <th>Status</th>
                    <th>Action</th>
                </tr>

            </thead>

            <tbody id="applicationBody">

            </tbody>

        </table>

        <!-- Pagination -->

        <div class="pagination">

            <button onclick="previousPage()">
                Previous
            </button>

            <span id="pageNumber">
                Page 1
            </span>

            <button onclick="nextPage()">
                Next
            </button>

        </div>

    </div>

    <script src="js/app.js"></script>

</body>

</html>
